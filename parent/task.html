<html> 
<head> 
    <title>Absolute Positioning</title> 
    <style> 
        .parent { 
            width: 400px; 
            height: 300px; 
            border: 1px solid black; 
            position: relative; /* Шаг 1: Сделали предка позиционированным */
        } 
        .box1 { 
            width: 100px; 
            height: 100px; 
            background-color: lightblue; 
        } 
        .box2 { 
            width: 150px; 
            height: 120px; 
            background-color: lightgreen; 
            position: absolute; /* Шаг 2 и 3: Включили абсолютное позиционирование */
            top: 30px;          /* Шаг 4: Отступ сверху */
            right: 20px;        /* Шаг 4: Отступ справа */
        } 
    </style> 
</head> 
<body> 
    <div class="parent"> 
        <div class="box1">Box 1</div> 
        <div class="box2">Box 2</div> 
    </div> 
</body> 
</html>
