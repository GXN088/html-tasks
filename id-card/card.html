<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Profile Card</title>
</head>
<body>

    <!-- カード全体を中央寄せにします -->
    <center>
        <!-- 見出し：名前 -->
        <h1>Jane Doe</h1>
        
        <!-- 画像：指定されたURL -->
        <img src="https://storage.googleapis.com/coddy-15505.appspot.com/public/avatars/avatar8.png" alt="Jane Doe's Avatar" width="150">
        
        <!-- 短い段落：自己紹介文 -->
        <p>Hello! I'm Jane, a beginner learning HTML. Excited to build amazing web pages!</p>
    </center>

</body>
</html>
