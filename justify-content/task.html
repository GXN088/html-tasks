<html>
<head>

    <style>
        .fruits, .vegetables {
            display: flex;

 .fruits {

}

.vegetables {
  display: flex;
  justify-content: space-between;
}

<body>

        <div>Banana</div>
        <div>Mango</div>
    </div>
    <div class="vegetables">
        <div>Tomato</div>
        <div>Potato</div>
        <div>Cucumber</div>
    </div>
</body>
</html>
