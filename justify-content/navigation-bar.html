<!DOCTYPE html> 
<html> 
<head> 
<title>Navigation Bar Layout</title> 
<style> 
    div { 
        padding: 10px; 
    } 

    /* Стилизация панели навигации */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center; /* Центрирует элементы по вертикали */
        background-color: #f1f1f1;
    }

    /* Стилизация контейнера действий */
    .actions {
        display: flex;
        justify-content: flex-end;
        align-items: center; /* Центрирует элементы по вертикали */
    }
</style> 
</head> 
<body> 

<div class="navbar"> 
    <div>Home</div> 
    <div>Products</div> 
    <div>Services</div> 
    <div>About</div> 
</div> 

<div class="actions"> 
    <div>Login</div> 
    <div>Sign Up</div> 
</div> 

</body> 
</html>
