<!DOCTYPE html>
<html lang="ru">
<head>
<title>Border Radius</title>
<style>
/* 1. Выбираем все элементы с классом "one" */
.one {
    border: 3px solid #4287f5;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 15px;
}

/* 2. Выбираем все элементы с классом "two" (пример с разными углами) */
.two {
    border: 2px dashed #ff5722;
    border-radius: 30px 10px 30px 10px;
    padding: 15px;
}
</style>
</head>
<body> 
<div class="one">This is a division with rounded corners.</div> 
<div class="two">This is another division with rounded corners.</div> 
</body> 
</html>
