<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Border Radius Mastery</title>
    <style>
        /* Напишите свой CSS-код здесь */
        #fancy-button {
            /* 1. Цвет фона */
            background-color: #4287f5;
            
            /* 2. Сплошная граница */
            border: 3px solid #0a2b63;
            
            /* 3. Внутренний отступ */
            padding: 15px;
            
            /* 4. Разные значения border-radius для каждого угла */
            /* Порядок: верхний-левый | верхний-правый | нижний-правый | нижний-левый */
            border-radius: 30px 5px 20px 10px;
            
            /* 5. Отступ сверху и снизу */
            margin: 20px 0;
            
            /* Дополнительные стили для красоты текста кнопки */
            color: white;
            text-align: center;
            display: inline-block;
            font-family: sans-serif;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="fancy-button">Click Me!</div>
</body>
</html>
