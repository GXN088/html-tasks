<html>
<head>
    <title>Selection Challenge</title>
    <style>
        /* Write CSS rules here */
        /* Шаг 1: Селектор типа для всех <p> */
        p {
            color: blue;
            font-size: 16px;
        }

        /* Шаг 3: Селектор класса для .highlight */
        .highlight {
            background-color: yellow;
        }

        /* Шаг 5: Селектор ID для #special */
        #special {
            background-color: lightgray;
            font-size: 20px;
        }

        /* Шаг 6: Групповой селектор для <h1> и <li> */
        h1, li {
            color: red;
        }
    </style>
</head>
<body>
    <h1>This is a main heading</h1>
    <!-- Шаг 2: Добавлен класс highlight к h2 -->
    <h2 class="highlight">This is a subheading</h2>
    <p>This is a paragraph.</p>
    <p>This is another paragraph.</p>
    <!-- Шаг 2: Добавлен класс highlight к div -->
    <div class="highlight">This is a division.</div>
    <!-- Шаг 4: Добавлен ID special к ul -->
    <ul id="special">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
</body>
</html>
