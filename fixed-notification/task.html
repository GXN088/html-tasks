<html>
<head>
    <title>Fixed Notification</title>
    <style>
        body {
            height: 2000px;
            margin: 0;
            padding: 20px;
        }
        
        /* Write your CSS here */
        .notification {
              position: fixed;
                bottom: 0;
                  left: 0;
                    width: 100%;
                      padding: 10px;
                        background-color: #3498db;
                          color: white;
                            text-align: center;
                              box-sizing: border-box; /* Предотвращает горизонтальную прокрутку из-за padding */
                              }
                              
        }
        
    </style>
</head>
<body>
    <h1>Scroll down to see the fixed notification</h1>
    <p>This page has content that makes it scrollable.</p>
    
    <div class="notification">Important! This site uses cookies for improved experience.</div>
</body>
</html>
