<!DOCTYPE html>
<html>
<head>
    <title>Navigation Menu with Absolute Positioning</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }       
        .nav-container {
            position: relative;
            width: 100%;
            height: 300px;
            border: 1px solid #ccc;
            background-color: #f5f5f5;
        }       
        .nav-menu button {
            padding: 8px 12px;
            margin-left: 5px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
         /* Write your CSS rules here */
         .nav-menu {
  position: absolute;
  top: 15px;
  right: 15px;
}

         
    </style>
</head>
<body>
    <div class="nav-container">
        <div class="nav-menu">
            <button>Home</button>
            <button>About</button>
            <button>Contact</button>
        </div>
    </div>
</body>
</html>
