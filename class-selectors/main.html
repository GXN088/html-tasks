<!DOCTYPE html>
<html>
<head>
    <title>Blog Styling</title>
    <style>
        /* Write your CSS rules here */
        .title {
                color: blue;
                }

                .intro {
                    font-size: 18px;
                    }

                    .highlight {
                        background-color: yellow;
                        }
                        
        }
    </style>
</head>
<body>
    <h1 class="title">Welcome to My Blog</h1>
    <p class="intro">This is my introduction paragraph that explains what this blog is about.</p>
    <p class="highlight">This is important information that I want to highlight for my readers.</p>
</body>
</html>
