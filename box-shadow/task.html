<!DOCTYPE html>
<html>
<head>
    <title>Card with Box Shadows</title>
    <style>
        /* Напишите здесь свои CSS-правила */
.card {
    /* Тень: смещение 5px по горизонтали, 5px по вертикали, размытие 10px, цвет #888888 */
    box-shadow: 5px 5px 10px #888888;
    /* Внутренний отступ */
    padding: 20px;
    /* Внешний отступ */
    margin: 20px;
}

        
    </style>
</head>
<body>
    <div class="card">
        <h2>Card Title</h2>
        <p>This is a professional card with box shadow effects that create depth.</p>
    </div>
</body>
</html>
