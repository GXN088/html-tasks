<!DOCTYPE html>
<html>
<head>
    <title>Responsive Hero Section</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            /* 1. Стилизуйте div hero-section с высотой 80vh */
            height: 80vh;
        }
        
        h1 {
            margin-bottom: 20px;
            /* 2. Сделайте размер шрифта заголовка 8vw */
            font-size: 8vw;
        }
        
        p {
            margin-bottom: 30px;
            /* 3. Сделайте размер шрифта абзаца 3vmin */
            font-size: 3vmin;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 2vmin;
            /* 4. Установите ширину кнопки 30vw и высоту 8vh */
            width: 30vw;
            height: 8vh;
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <h1>Welcome to My Website</h1>
        <p>This is a responsive hero section using viewport units</p>
        <button>Learn More</button>
    </div>
</body>
</html>
