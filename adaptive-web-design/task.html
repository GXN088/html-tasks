<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .card-container {
            width: 90%;
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid #ddd;
            overflow: hidden;
        }
        /* Write your CSS rules here */
        .product-image {
    width: 40%;
    float: left;
    background-color: #f0f0f0;
    height: 200px;
    box-sizing: border-box;
}

.product-details {
    width: 60%;
    float: left;
    padding: 15px;
    box-sizing: border-box;
}

        
    </style>
</head>
<body>
    <div class="card-container">
        <div class="product-image">Product Image</div>
        <div class="product-details">
            <h2>Product Title</h2>
            <p>This is a product description. It showcases the responsive fluid layout using percentage-based widths.</p>
        </div>
    </div>
</body>
</html>
